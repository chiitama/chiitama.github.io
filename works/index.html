<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Pro</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0d0d0d;
  color:#fff;
}

/* ヘッダー */
.header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:50px;
  background:#111;
  display:flex;
  align-items:center;
  padding:0 20px;
  z-index:1000;
  border-bottom:1px solid #222;
}

.container{
  display:flex;
  margin-top:50px;
  height:calc(100vh - 50px);
}

/* 左 */
.sidebar{
  width:120px;
  background:#111;
  padding:20px 10px;
  border-right:1px solid #222;
}

.category{ cursor:pointer; margin-bottom:10px; opacity:0.7; }
.category:hover{ opacity:1; }

/* 右 */
.main{
  flex:1;
  overflow:hidden;
  position:relative;
}

.scroll-area{
  position:absolute;
  width:100%;
  column-count:3;
  column-gap:10px;
  animation:scrollUp 60s linear infinite;
}

.scroll-area:hover{ animation-play-state:paused; }

@keyframes scrollUp{
  0%{ transform:translateY(100%);} 
  100%{ transform:translateY(-100%);} 
}

.card{
  break-inside:avoid;
  margin-bottom:10px;
  background:#1a1a1a;
  border-radius:8px;
  overflow:hidden;
  cursor:pointer;
}

.card img, .card video{
  width:100%;
  display:block;
}

/* モーダル */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:2000;
}

.modal-content{
  max-width:90%;
  max-height:90%;
}

/* スマホ */
@media(max-width:768px){
  .scroll-area{ column-count:2; }
  .sidebar{ display:flex; width:100%; overflow-x:auto; }
  .container{ flex-direction:column; }
}

</style>
</head>

<body>

<div class="header">PORTFOLIO</div>

<div class="container">

<div class="sidebar">
  <div class="category" onclick="filter('all')">ALL</div>
  <div class="category" onclick="filter('flyer')">チラシ</div>
  <div class="category" onclick="filter('video')">動画</div>
</div>

<div class="main">
  <div class="scroll-area" id="scrollArea">

    <!-- サンプル -->
    <div class="card flyer" onclick="openModal(this)">
      <img src="sample1.jpg">
    </div>

    <div class="card video" onclick="openModal(this)">
      <video src="sample.mp4" muted loop></video>
    </div>

    <div class="card flyer" onclick="openModal(this)">
      <img src="sample2.jpg">
    </div>

  </div>
</div>

</div>

<!-- モーダル -->
<div class="modal" id="modal" onclick="closeModal()">
  <div class="modal-content" id="modalContent"></div>
</div>

<script>

// 無限ループ
const area = document.getElementById('scrollArea');
area.innerHTML += area.innerHTML;

function filter(type){
  document.querySelectorAll('.card').forEach(c=>{
    c.style.display = (type==='all'||c.classList.contains(type))?'block':'none';
  });
}

function openModal(el){
  const modal = document.getElementById('modal');
  const content = document.getElementById('modalContent');
  content.innerHTML = el.innerHTML;
  modal.style.display='flex';
}

function closeModal(){
  document.getElementById('modal').style.display='none';
}

</script>

</body>
</html>
